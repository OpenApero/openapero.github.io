<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenApero - Coming Soon</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d1117;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --robot-body: #161b22;
            --robot-border: #30363d;
            --lens-dark: #0a0e14;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            perspective: 1500px;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 0.2rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
            font-family: 'Michroma', sans-serif;
            padding: 0 10px;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            max-width: 600px;
            line-height: 1.5;
            padding: 0 20px;
        }

        /* --- THE PERCEPTION UNIT (FACE) --- */
        .robot-wrapper {
            width: 260px;
            height: 200px;
            position: relative;
            margin: 2rem auto;
            cursor: pointer;
            transform-style: preserve-3d;
            /* Prevent text selection when tapping rapidly on mobile */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .robot-body {
            width: 220px;
            height: 160px;
            background: var(--robot-body);
            border-radius: 40px;
            position: absolute;
            top: 50%;
            left: 50%;
            border: 10px solid var(--robot-border);
            box-shadow: 
                inset 0 0 50px #000, 
                0 30px 60px rgba(0,0,0,0.8),
                0 0 25px var(--accent-glow);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            z-index: 5;
            transform: translate(-50%, -50%); 
        }

        /* --- INTERACTIVE EYES --- */
        .perception-cluster {
            display: flex;
            gap: 25px;
            transform: translateZ(20px); 
        }

        .eye {
            width: 65px;
            height: 65px;
            background: radial-gradient(circle at 30% 30%, #2a313c, var(--lens-dark) 70%);
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 20px #000, 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .pupil {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                inset -6px -6px 12px rgba(0,0,0,0.7), 
                inset 2px 2px 6px rgba(255,255,255,0.5), 
                0 0 15px var(--accent),
                0 0 35px var(--accent-glow);
        }

        .pupil::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 5px;
            width: 10px;
            height: 6px; 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 50%;
            transform: rotate(-30deg);
            filter: blur(0.5px);
        }

        .pupil::before {
            content: '';
            position: absolute;
            bottom: 3px;
            right: 4px;
            width: 12px;
            height: 5px;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        /* --- UI ELEMENTS --- */
        #message {
            font-size: 1.2rem;
            height: 30px;
            margin-top: 10px;
            margin-bottom: 2rem;
            color: #ff7b72;
            font-weight: bold;
            padding: 0 10px;
        }

        .eta-badge {
            background: #238636;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border: 1px solid rgba(240, 246, 252, 0.1);
            text-transform: uppercase;
        }

        .instructions {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 0 20px;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            h2 {
                font-size: 0.9rem;
                margin-bottom: 1.5rem;
            }
            .robot-wrapper {
                margin: 1rem auto;
                transform: scale(0.9); /* Slightly shrinks the robot to ensure it fits small screens safely */
            }
            #message {
                font-size: 1rem;
                height: 40px; /* Gives text room to wrap if needed */
            }
            .eta-badge {
                font-size: 1rem;
                padding: 10px 20px;
            }
            .instructions {
                margin-top: 2rem;
            }
        }
    </style>
</head>
<body>

    <h1>OpenApero</h1>
    <h2>OPEN Active PErception library for RObotics</h2>

    <div class="robot-wrapper" id="robot" onclick="pokeRobot()">
        <div class="robot-body" id="body">
            <div class="perception-cluster">
                <div class="eye"><div class="pupil" id="pupil-left"></div></div>
                <div class="eye"><div class="pupil" id="pupil-right"></div></div>
            </div>
        </div>
    </div>

    <div id="message">Booting core perception module...</div>
    <div class="eta-badge">Releasing Summer 2026</div>
    <div class="instructions">Move your cursor or touch the screen to test tracking. Tap the unit to debug.</div>

    <script>
        const robotWrapper = document.getElementById('robot');
        const robotBody = document.getElementById('body');
        const pupilLeft = document.getElementById('pupil-left');
        const pupilRight = document.getElementById('pupil-right');
        const messageDisplay = document.getElementById('message');

        const messages = [
            "Haptic feedback detected. Ouch.",
            "Recalibrating binocular vision...",
            "404: OpenApero.cpp not found. (Check GitHub?)",
            "Beep boop. Developers are heavily caffeinated.",
            "Hover thrusters stabilizing...",
            "Compiling... ETA: Summer 2026.",
            "Error: Impatient human detected in active field.",
            "I see you waiting! (With both my active eyes)."
        ];

        let targetX = 0, targetY = 0;
        let currentBodyRotX = 0, currentBodyRotY = 0;
        let currentPupilX = 0, currentPupilY = 0;
        let pupilScale = 1, targetPupilScale = 1;
        let time = 0; 

        const lerp = (start, end, factor) => start + (end - start) * factor;

        // Unified function to handle both mouse and touch coordinates
        function updateTrackingCoordinates(clientX, clientY) {
            const rect = robotWrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            targetX = (clientX - centerX) / (window.innerWidth / 2);
            targetY = (clientY - centerY) / (window.innerHeight / 2);
        }

        // Mouse Events
        document.addEventListener('mousemove', (e) => {
            updateTrackingCoordinates(e.clientX, e.clientY);
        });

        // Touch Events for Mobile
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                updateTrackingCoordinates(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                updateTrackingCoordinates(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        function animate() {
            time += 0.05;

            // 1. Hovering Animation
            const hoverOffset = Math.sin(time) * 8; 
            
            // 2. Tilt the Body
            const maxBodyRotX = 20; 
            const maxBodyRotY = 25; 
            
            let bRotX = -targetY * maxBodyRotX; 
            let bRotY = targetX * maxBodyRotY;

            currentBodyRotX = lerp(currentBodyRotX, bRotX, 0.08); 
            currentBodyRotY = lerp(currentBodyRotY, bRotY, 0.08);

            robotBody.style.transform = `translate(-50%, calc(-50% + ${hoverOffset}px)) translateZ(30px) rotateX(${currentBodyRotX}deg) rotateY(${currentBodyRotY}deg)`;

            // 3. Move the Pupils
            const maxPupilDist = 18; 
            let pX = targetX * maxPupilDist;
            let pY = targetY * maxPupilDist;

            currentPupilX = lerp(currentPupilX, pX, 0.15); 
            currentPupilY = lerp(currentPupilY, pY, 0.15);
            pupilScale = lerp(pupilScale, targetPupilScale, 0.2);

            const pupilTransform = `translate(calc(-50% + ${currentPupilX}px), calc(-50% + ${currentPupilY}px)) scale(${pupilScale})`;
            pupilLeft.style.transform = pupilTransform;
            pupilRight.style.transform = pupilTransform;

            requestAnimationFrame(animate);
        }

        animate();

        function pokeRobot() {
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            messageDisplay.innerText = "> " + randomMessage;
            
            targetPupilScale = 0.3; 
            setTimeout(() => {
                targetPupilScale = 1.3; 
                setTimeout(() => {
                    targetPupilScale = 1; 
                }, 150);
            }, 100);
        }

        setTimeout(() => {
            messageDisplay.innerText = "> Perception cluster online. Waiting for Summer 2026...";
        }, 2500);

    </script>
</body>
</html>
